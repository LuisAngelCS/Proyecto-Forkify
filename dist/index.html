<!DOCTYPE html><html lang="en"><head><script type="importmap">{"imports":{"fNVyn":"/icons.0809ef97.svg"}}</script><link rel="stylesheet" href="/forkify_solution.aa436662.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="shortcut icon" href="/favicon.8b2f57bf.png" type="image/x-icon">
    <title>forkify // Search over 1,000,000 recipes</title>
  </head>

  <body>
    <div class="container">
      <header class="header">
        <img src="/logo.726d37a8.png" alt="Logo" class="header__logo">

        <form class="search">
          <input type="text" class="search__field" placeholder="Search over 1,000,000 recipes...">
          <button class="btn search__btn" type="submit">
            <svg class="search__icon">
              <use href="/icons.21bad73c.svg#icon-search"></use>
            </svg>
            <span>Search</span>
          </button>
        </form>

        <nav class="nav">
          <ul class="nav__list">
            <li class="nav__item">
              <button class="nav__btn nav__btn--add-recipe" type="button">
                <svg class="nav__icon">
                  <use href="/icons.21bad73c.svg#icon-edit"></use>
                </svg>
                <span>Add recipe</span>
              </button>
            </li>
            <li class="nav__item">
              <button class="nav__btn nav__btn--bookmarks" type="button">
                <svg class="nav__icon">
                  <use href="/icons.21bad73c.svg#icon-bookmark"></use>
                </svg>
                <span>Bookmarks</span>
              </button>
              <div class="bookmarks">
                <ul class="bookmarks__list">
                  <div class="message">
                    <div>
                      <svg>
                        <use href="/icons.21bad73c.svg#icon-smile"></use>
                      </svg>
                    </div>
                    <p>No bookmarks yet. Find a nice recipe and bookmark it :)</p>
                  </div>
                </ul>
              </div>
            </li>
          </ul>
        </nav>
      </header>

      <div class="search-results">
        <ul class="results">
        </ul>

        <div class="pagination"></div>

        <p class="copyright">
          Proyecto escolar para Programación con JavaScript II.
        </p>
      </div>

      <div class="recipe">
        <div class="message">
          <div>
            <svg>
              <use href="/icons.21bad73c.svg#icon-smile"></use>
            </svg>
          </div>
          <p>Start by searching for a recipe or an ingredient. Have fun!</p>
        </div>
      </div>
    </div>

    <div class="overlay hidden"></div>
    <div class="add-recipe-window hidden">
      <button class="btn--close-modal">×</button>
      <form class="upload">
        <div class="upload__column">
          <h3 class="upload__heading">Recipe data</h3>
          <label>Title</label>
          <input value="" type="text" name="title">
          <label>URL</label>
          <input value="" type="text" name="sourceUrl">
          <label>Image URL</label>
          <input value="" type="text" name="image">
          <label>Publisher</label>
          <input value="" type="text" name="publisher">
          <label>Prep time</label>
          <input value="" type="number" name="cookingTime">
          <label>Servings</label>
          <input value="" type="number" name="servings">
        </div>

        <div class="upload__column">
          <h3 class="upload__heading">Ingredients</h3>
          <label>Ingredient 1</label>
          <input type="text" name="ingredient-1" placeholder="Format: 'Quantity,Unit,Description'">
          <label>Ingredient 2</label>
          <input type="text" name="ingredient-2" placeholder="Format: 'Quantity,Unit,Description'">
          <label>Ingredient 3</label>
          <input type="text" name="ingredient-3" placeholder="Format: 'Quantity,Unit,Description'">
          <label>Ingredient 4</label>
          <input type="text" name="ingredient-4" placeholder="Format: 'Quantity,Unit,Description'">
          <label>Ingredient 5</label>
          <input type="text" name="ingredient-5" placeholder="Format: 'Quantity,Unit,Description'">
          <label>Ingredient 6</label>
          <input type="text" name="ingredient-6" placeholder="Format: 'Quantity,Unit,Description'">
        </div>

        <button class="btn upload__btn" type="button">
          <svg>
            <use href="/icons.21bad73c.svg#icon-upload-cloud"></use>
          </svg>
          <span>Upload</span>
        </button>
      </form>
    </div>

    <script type="module" src="/forkify_solution.4a59a05f.js"></script>
  

</body></html>
